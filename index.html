<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klassisches 3D-Webradio</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #aaa;
            pointer-events: none;
            font-size: 0.9rem;
            z-index: 10;
        }
        #hud span { color: #1db954; font-weight: bold; }
    </style>
</head>
<body>

<div id="hud">
    3D Radio-Status: <span id="status">Bereit</span><br>
    Aktueller Sender: <span id="station-display">- Kein Sender -</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, raycaster, mouse;
    let stations = [];
    let audioCtx, audioElement, panner;
    let isPlaying = false, isMuted = false;

    // 3D Radio-Komponenten
    let playBtnMesh, muteBtnMesh, volumeSliderMesh;
    let stationMeshes = [];

    async function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 7);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 3;
        controls.maxDistance = 15;

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        // Beleuchtung für gemütliche Werkstatt-Atmosphäre
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);
        const spotLight = new THREE.SpotLight(0xffffff, 0.8);
        spotLight.position.set(5, 10, 5);
        scene.add(spotLight);

        // Tischplatte
        const table = new THREE.Mesh(new THREE.BoxGeometry(10, 0.1, 5), new THREE.MeshPhongMaterial({ color: 0x333333 }));
        table.position.y = -1.55;
        scene.add(table);

        // Das Haupt-Radio bauen
        buildRadio();

        // Sender laden
        try {
            const res = await fetch('stations.json');
            stations = await res.json();
            buildStationMenu();
        } catch(e) {
            document.getElementById('status').innerText = "Fehler (stations.json)";
        }

        window.addEventListener('mousedown', onRadioClick);
        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function buildRadio() {
        // 1. Das Holzgehäuse
        const bodyGeo = new THREE.BoxGeometry(4, 2.5, 2);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.7 }); // Braun/Holz
        const radioBody = new THREE.Mesh(bodyGeo, bodyMat);
        radioBody.position.y = -0.3;
        scene.add(radioBody);

        // 2. Die Frontblende (Bedienfeld)
        const faceGeo = new THREE.BoxGeometry(3.7, 2.2, 0.1);
        const faceMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.4 }); // Silber/Grau
        const radioFace = new THREE.Mesh(faceGeo, faceMat);
        radioFace.position.set(0, -0.3, 1);
        scene.add(radioFace);

        // 3. Lautsprecher-Grill (Schwarzer Kreis links)
        const grillGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.05, 32);
        const grillMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
        const grill = new THREE.Mesh(grillGeo, grillMat);
        grill.rotation.x = Math.PI / 2;
        grill.position.set(-0.9, -0.3, 1.05);
        scene.add(grill);

        // 4. Play/Pause Knopf (Groß, rund, rechts unten)
        const btnGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.15, 32);
        const playMat = new THREE.MeshStandardMaterial({ color: 0x1db954, roughness: 0.5 });
        playBtnMesh = new THREE.Mesh(btnGeo, playMat);
        playBtnMesh.rotation.x = Math.PI / 2;
        playBtnMesh.position.set(0.4, -0.9, 1.05);
        playBtnMesh.userData = { type: 'play' };
        scene.add(playBtnMesh);

        // 5. Mute Knopf (Klein, rund, rechts daneben)
        const muteMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.5 });
        muteBtnMesh = new THREE.Mesh(btnGeo, muteMat);
        muteBtnMesh.scale.set(0.7, 1, 0.7);
        muteBtnMesh.rotation.x = Math.PI / 2;
        muteBtnMesh.position.set(1.0, -0.9, 1.05);
        muteBtnMesh.userData = { type: 'mute' };
        scene.add(muteBtnMesh);

        // 6. Lautstärke-Schieberegler (0-100 Schiene rechts oben)
        const railGeo = new THREE.BoxGeometry(1.2, 0.05, 0.05);
        const railMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const rail = new THREE.Mesh(railGeo, railMat);
        rail.position.set(0.7, -0.4, 1.05);
        scene.add(rail);

        const sliderGeo = new THREE.BoxGeometry(0.1, 0.2, 0.1);
        const sliderMat = new THREE.MeshStandardMaterial({ color: 0x0088cc });
        volumeSliderMesh = new THREE.Mesh(sliderGeo, sliderMat);
        volumeSliderMesh.position.set(0.7, -0.4, 1.08); // Start in der Mitte (50%)
        volumeSliderMesh.userData = { type: 'volume', railX: 0.7, railWidth: 1.2 };
        scene.add(volumeSliderMesh);
    }

    // Senderliste als kleine 3D-Klick-Schilder auf der rechten oberen Seite des Radios anbringen
    function buildStationMenu() {
        stations.slice(0, 4).forEach((station, i) => { // Begrenzt auf max 4 Sender fürs UI-Layout
            const labelGeo = new THREE.BoxGeometry(1.2, 0.2, 0.02);
            const labelMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const labelMesh = new THREE.Mesh(labelGeo, labelMat);
            
            // Untereinander stapeln auf der Frontblende
            labelMesh.position.set(0.7, 0.5 - (i * 0.25), 1.05);
            labelMesh.userData = { type: 'station', url: station.url, name: station.name, index: i };
            
            scene.add(labelMesh);
            stationMeshes.push(labelMesh);
        });
    }

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioElement = new Audio();
        audioElement.crossOrigin = "anonymous";
        
        const source = audioCtx.createMediaElementSource(audioElement);
        panner = audioCtx.createPanner();
        panner.panningModel = 'HRTF'; // Sorgt dafür, dass es sich im Raum echt anhört

        source.connect(panner);
        panner.connect(audioCtx.destination);
    }

    function onRadioClick(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(scene.children);

        if (intersects.length > 0) {
            const obj = intersects[0].object;
            const data = obj.userData;

            if (!data.type) return;
            
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // PLAY / PAUSE
            if (data.type === 'play') {
                if (!audioElement.src && stations.length > 0) selectStation(0); // Falls noch kein Sender aktiv war
                
                if (!isPlaying) {
                    audioElement.play();
                    isPlaying = true;
                    playBtnMesh.position.z = 1.01; // Knopf hineindrücken
                    document.getElementById('status').innerText = "Spielt";
                } else {
                    audioElement.pause();
                    isPlaying = false;
                    playBtnMesh.position.z = 1.05; // Knopf kommt wieder raus
                    document.getElementById('status').innerText = "Pausiert";
                }
            }
            
            // MUTE
            else if (data.type === 'mute') {
                isMuted = !isMuted;
                audioElement.muted = isMuted;
                muteBtnMesh.material.emissive.setHex(isMuted ? 0xcc0000 : 0x000000);
                muteBtnMesh.position.z = isMuted ? 1.01 : 1.05;
            }

            // SENDERWAHL
            else if (data.type === 'station') {
                selectStation(data.index);
            }

            // LAUTSTÄRKE (Klick auf den Regler verschiebt ihn)
            else if (data.type === 'volume') {
                const intersectPoint = intersects[0].point;
                // Begrenze das Verschieben auf die Schienenbreite
                const minX = data.railX - (data.railWidth / 2);
                const maxX = data.railX + (data.railWidth / 2);
                const newX = Math.max(minX, Math.min(maxX, intersectPoint.x));
                
                volumeSliderMesh.position.x = newX;
                
                // Berechne Prozentwert (0.0 bis 1.0)
                const volumePercent = (newX - minX) / data.railWidth;
                audioElement.volume = volumePercent;
                document.getElementById('status').innerText = `Lautstärke: ${Math.round(volumePercent * 100)}%`;
            }
        }
    }

    function selectStation(index) {
        const s = stations[index];
        document.getElementById('station-display').innerText = s.name;
        document.getElementById('status').innerText = "Verbinde...";
        
        audioElement.src = s.url;
        audioElement.play();
        isPlaying = true;
        playBtnMesh.position.z = 1.01;

        // Visuelles Feedback: Ausgewähltes Senderschild einfärben
        stationMeshes.forEach((mesh, i) => {
            mesh.material.color.setHex(i === index ? 0x1db954 : 0x333333);
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();

        // Raumklang an Kameraposition heften
        if (audioCtx) {
            panner.positionX.setValueAtTime(camera.position.x, audioCtx.currentTime);
            panner.positionY.setValueAtTime(camera.position.y, audioCtx.currentTime);
            panner.positionZ.setValueAtTime(camera.position.z, audioCtx.currentTime);
        }

        renderer.render(scene, camera);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    window.onload = init;
</script>
</body>
</html>
