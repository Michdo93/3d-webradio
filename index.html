<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klassisches 3D-Webradio</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; user-select: none; }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #aaa;
            pointer-events: none;
            font-size: 1rem;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
            line-height: 1.5;
        }
        #hud span { color: #1db954; font-weight: bold; }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 0.85rem;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="hud">
    3D Radio-Status: <span id="status">Bereit</span><br>
    Aktueller Sender: <span id="station-display">- Kein Sender (Bitte wählen) -</span><br>
    Lautstärke: <span id="volume-display">50%</span>
</div>

<div id="instructions">
    Links-Klick + Ziehen auf Knöpfe/Regler zur Bedienung | Rechts-Klick + Ziehen zum Drehen der Kamera
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, raycaster, mouse;
    let stations = [];
    let audioCtx, audioElement, panner;
    let isPlaying = false, isMuted = false;

    // 3D Radio-Komponenten
    let playBtnMesh, muteBtnMesh, volumeSliderMesh;
    let stationMeshes = [];
    
    // Dragging-Variablen für den Regler
    let isDraggingVolume = false;
    const railX = 0.7;
    const railWidth = 1.2;
    const minX = railX - (railWidth / 2);
    const maxX = railX + (railWidth / 2);

    async function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x141416);

        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 5); // Kamera etwas näher ran für leichtere Bedienung

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // OrbitControls anpassen: Linksklick für Radio-Bedienung, Rechtsklick/Zwei-Finger für Kamera
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 2.5;
        controls.maxDistance = 10;
        controls.mouseButtons = {
            LEFT: THREE.MOUSE.NONE, // Linksklick für Orbit deaktivieren, damit wir ungestört klicken können
            MIDDLE: THREE.MOUSE.DOLLY,
            RIGHT: THREE.MOUSE.ROTATE
        };

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        // Lichtquellen
        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // Tischplatte
        const table = new THREE.Mesh(new THREE.BoxGeometry(12, 0.1, 6), new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 }));
        table.position.y = -1.55;
        scene.add(table);

        buildRadio();

        // Sender aus stations.json laden
        try {
            const res = await fetch('stations.json');
            stations = await res.json();
            buildStationMenu();
        } catch(e) {
            document.getElementById('status').innerText = "Fehler: stations.json fehlt!";
        }

        // Event-Listener für präzise Maus-Interaktion
        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        window.addEventListener('resize', onWindowResize);
        
        animate();
    }

    function buildRadio() {
        // Holzgehäuse
        const radioBody = new THREE.Mesh(
            new THREE.BoxGeometry(4, 2.5, 2), 
            new THREE.MeshStandardMaterial({ color: 0x6e4720, roughness: 0.6 })
        );
        radioBody.position.y = -0.3;
        scene.add(radioBody);

        // Frontblende
        const radioFace = new THREE.Mesh(
            new THREE.BoxGeometry(3.7, 2.2, 0.1), 
            new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3 })
        );
        radioFace.position.set(0, -0.3, 1);
        scene.add(radioFace);

        // Lautsprecher-Grill
        const grill = new THREE.Mesh(
            new THREE.CylinderGeometry(0.8, 0.8, 0.05, 32), 
            new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 })
        );
        grill.rotation.x = Math.PI / 2;
        grill.position.set(-0.9, -0.3, 1.05);
        scene.add(grill);

        // Play/Pause Button (Groß, grün)
        playBtnMesh = new THREE.Mesh(
            new THREE.CylinderGeometry(0.2, 0.2, 0.15, 32), 
            new THREE.MeshStandardMaterial({ color: 0x1db954, roughness: 0.4 })
        );
        playBtnMesh.rotation.x = Math.PI / 2;
        playBtnMesh.position.set(0.4, -0.9, 1.05);
        playBtnMesh.userData = { type: 'play' };
        scene.add(playBtnMesh);

        // Mute Button (Klein, grau/rot)
        muteBtnMesh = new THREE.Mesh(
            new THREE.CylinderGeometry(0.14, 0.14, 0.15, 32), 
            new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.4 })
        );
        muteBtnMesh.rotation.x = Math.PI / 2;
        muteBtnMesh.position.set(1.1, -0.9, 1.05);
        muteBtnMesh.userData = { type: 'mute' };
        scene.add(muteBtnMesh);

        // Lautstärkeschiene
        const rail = new THREE.Mesh(
            new THREE.BoxGeometry(railWidth, 0.04, 0.04), 
            new THREE.MeshStandardMaterial({ color: 0x111111 })
        );
        rail.position.set(railX, -0.4, 1.05);
        scene.add(rail);

        // Der bewegliche Regler-Knopf
        volumeSliderMesh = new THREE.Mesh(
            new THREE.BoxGeometry(0.08, 0.2, 0.1), 
            new THREE.MeshStandardMaterial({ color: 0x007acc, roughness: 0.2 })
        );
        volumeSliderMesh.position.set(railX, -0.4, 1.08); // Start bei 50%
        volumeSliderMesh.userData = { type: 'volume' };
        scene.add(volumeSliderMesh);
    }

    function buildStationMenu() {
        // Generiert bis zu 4 Schilder direkt auf der Front des Radios
        stations.slice(0, 4).forEach((station, i) => {
            const labelMesh = new THREE.Mesh(
                new THREE.BoxGeometry(1.3, 0.2, 0.03), 
                new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.5 })
            );
            labelMesh.position.set(0.7, 0.5 - (i * 0.26), 1.05);
            labelMesh.userData = { type: 'station', url: station.url, name: station.name, index: i };
            
            scene.add(labelMesh);
            stationMeshes.push(labelMesh);
        });
    }

    // --- AUDIO CORE ---
    function initAudio() {
        if (audioCtx) return;
        
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioElement = new Audio();
        audioElement.crossOrigin = "anonymous"; 
        audioElement.volume = 0.5;

        const source = audioCtx.createMediaElementSource(audioElement);
        panner = audioCtx.createPanner();
        panner.panningModel = 'HRTF';

        source.connect(panner);
        panner.connect(audioCtx.destination);
    }

    // --- INTERAKTIONSLOGIK ---
    function onMouseDown(event) {
        if (event.button !== 0) return; // Nur Linksklick erlauben

        updateMouseCoords(event);
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(scene.children);

        if (intersects.length > 0) {
            const obj = intersects[0].object;
            const data = obj.userData;

            if (!data.type) return;
            
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // 1. KNOPF: PLAY/PAUSE
            if (data.type === 'play') {
                if (!audioElement.src && stations.length > 0) selectStation(0);
                togglePlay();
            }
            
            // 2. KNOPF: MUTE
            else if (data.type === 'mute') {
                toggleMute();
            }

            // 3. SENDERLISTE
            else if (data.type === 'station') {
                selectStation(data.index);
            }

            // 4. REGELUNG STARTEN (VOLUME)
            else if (data.type === 'volume') {
                isDraggingVolume = true;
                // Deaktiviere Kamera-Damping während des Ziehens
                controls.enabled = false;
            }
        }
    }

    function onMouseMove(event) {
        if (!isDraggingVolume) return;

        updateMouseCoords(event);
        raycaster.setFromCamera(mouse, camera);
        
        // Erzeuge eine virtuelle mathematische Ebene auf der Radiofront, um die Mausposition im Raum zu bestimmen
        const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), -1.08);
        const intersectionPoint = new THREE.Vector3();
        raycaster.ray.intersectPlane(plane, intersectionPoint);

        if (intersectionPoint) {
            // Begrenze die Bewegung auf die Schiene
            const newX = Math.max(minX, Math.min(maxX, intersectionPoint.x));
            volumeSliderMesh.position.x = newX;

            // Prozentwert berechnen und an Audio übergeben
            const volumePercent = (newX - minX) / railWidth;
            if (audioElement) {
                audioElement.volume = volumePercent;
            }
            document.getElementById('volume-display').innerText = `${Math.round(volumePercent * 100)}%`;
        }
    }

    function onMouseUp() {
        if (isDraggingVolume) {
            isDraggingVolume = false;
            controls.enabled = true; // Kamera wieder freigeben
        }
    }

    function updateMouseCoords(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    }

    // --- HILFSFUNKTIONEN FÜR AUDIO-STEUERUNG ---
    function selectStation(index) {
        const s = stations[index];
        document.getElementById('station-display').innerText = s.name;
        document.getElementById('status').innerText = "Verbinde Stream...";
        
        audioElement.src = s.url;
        
        audioElement.play().then(() => {
            isPlaying = true;
            playBtnMesh.position.z = 1.02; // Visuell reingedrückt
            document.getElementById('status').innerText = "Spielt live";
        }).catch(err => {
            console.error(err);
            document.getElementById('status').innerText = "CORS / Stream-Fehler!";
            isPlaying = false;
            playBtnMesh.position.z = 1.05;
        });

        // Schilder farblich markieren
        stationMeshes.forEach((mesh, i) => {
            mesh.material.color.setHex(i === index ? 0x1db954 : 0x2a2a2a);
        });
    }

    function togglePlay() {
        if (!isPlaying) {
            audioElement.play().then(() => {
                isPlaying = true;
                playBtnMesh.position.z = 1.02;
                document.getElementById('status').innerText = "Spielt live";
            });
        } else {
            audioElement.pause();
            isPlaying = false;
            playBtnMesh.position.z = 1.05;
            document.getElementById('status').innerText = "Pausiert";
        }
    }

    function toggleMute() {
        isMuted = !isMuted;
        audioElement.muted = isMuted;
        muteBtnMesh.material.color.setHex(isMuted ? 0xd11a2a : 0x555555);
        muteBtnMesh.position.z = isMuted ? 1.02 : 1.05;
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();

        // 3D-Raumklang-Berechnung (Kamera-Abstand simuliert Ohren)
        if (audioCtx && panner) {
            panner.positionX.setValueAtTime(camera.position.x, audioCtx.currentTime);
            panner.positionY.setValueAtTime(camera.position.y, audioCtx.currentTime);
            panner.positionZ.setValueAtTime(camera.position.z, audioCtx.currentTime);
        }

        renderer.render(scene, camera);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    window.onload = init;
</script>
</body>
</html>
